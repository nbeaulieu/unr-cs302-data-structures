<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insertion Sort — Shift & Insert | CS 302</title>
<meta name="description" content="Interactive visualization of Insertion Sort algorithm. Save next unsorted item, shift sorted items right, insert into gap. Sorted region grows left to right.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B0F1A; color: #fff; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; padding: 24px; min-height: 100vh; }
  .back-link { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 13px; color: #22D3EE; text-decoration: none; display: inline-block; margin-bottom: 10px; transition: color 0.2s; }
  .back-link:hover, .back-link:focus { color: #818CF8; text-decoration: underline; }
  .back-link:focus-visible { outline: 2px solid #818CF8; outline-offset: 2px; border-radius: 2px; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: #818CF8; font-size: 14px; margin-bottom: 18px; line-height: 1.5; }
  .subtitle .orange { color: #FB923C; font-weight: bold; }
  .subtitle .bold { font-weight: bold; }
  .legend { display: flex; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #CBD5E1; }
  /* Improved contrast: #CBD5E1 on #0B0F1A = 12.3:1 ✅ WCAG AAA */
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #4338CA; flex-shrink: 0; }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .btn { background: #312E81; color: #818CF8; border: 1px solid #4338CA; border-radius: 6px; padding: 6px 16px; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn:hover, .btn:focus { background: #3730A3; }
  .btn:focus-visible { outline: 2px solid #818CF8; outline-offset: 2px; }
  .btn.active { background: #065F46; border-color: #818CF8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .controls label { color: #CBD5E1; font-size: 13px; }
  /* Improved contrast: #CBD5E1 on #0B0F1A = 12.3:1 ✅ WCAG AAA */
  .controls span { color: #fff; font-size: 13px; }
  .step-row { display: flex; align-items: flex-start; margin-bottom: 4px; min-height: 72px; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
  .step-row.visible { opacity: 1; transform: translateY(0); }
  .step-label { width: 100px; flex-shrink: 0; font-size: 13px; font-weight: bold; color: #818CF8; padding-top: 14px; line-height: 1.3; }
  .step-label .step-num { color: #22D3EE; font-size: 11px; font-weight: normal; }
  .array-area { display: flex; flex-direction: column; gap: 2px; }
  .hand-row { display: flex; gap: 6px; height: 28px; align-items: center; margin-bottom: 4px; margin-left: 1px; }
  .hand-cell { width: 64px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 15px; font-weight: bold; flex-shrink: 0; }
  .hand-cell.held { background: #6366F1; border: 1.5px dashed #A5B4FC; color: #fff; }
  .hand-cell.empty { background: transparent; border: none; }
  .hand-label { font-size: 10px; color: #A5B4FC; margin-right: 6px; width: 50px; text-align: right; flex-shrink: 0; }
  .cells { display: flex; gap: 6px; flex-wrap: wrap; }
  .cell { width: 64px; height: 46px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1.5px solid #4338CA; font-size: 20px; font-weight: bold; position: relative; transition: background 0.3s ease; flex-shrink: 0; }
  .cell .idx { position: absolute; bottom: -15px; font-size: 10px; color: #CBD5E1; font-weight: normal; }
  /* Improved contrast: #CBD5E1 on #0B0F1A = 12.3:1 ✅ WCAG AAA */
  .cell.sorted { background: #065F46; }
  .cell.unsorted { background: #312E81; }
  .cell.shifted { background: #9A3412; }
  .cell.inserted { background: #6366F1; }
  .cell.gap { background: #0B0F1A; border-style: dashed; border-color: #4338CA; }
  .note { margin-left: 16px; font-size: 12px; color: #CBD5E1; max-width: 320px; line-height: 1.4; padding-top: 14px; }
  /* Improved contrast: #CBD5E1 on #0B0F1A = 12.3:1 ✅ WCAG AAA */
  .note .shift-text { color: #FB923C; font-weight: bold; }
  .note .insert-text { color: #A5B4FC; font-weight: bold; }
  .note .ok-text { color: #818CF8; font-weight: bold; }
  .divider { border: none; border-top: 1px solid #334155; margin: 8px 0; }
  /* Reduced motion support for accessibility (WCAG 2.3.3) */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  
  @media (max-width: 640px) {
    body { padding: 16px; }
    h1 { font-size: 20px; }
    .subtitle { font-size: 13px; }
    .controls { gap: 8px; }
    .controls input[type=range] { width: 150px; }
    .btn { padding: 5px 12px; font-size: 12px; }
    .step-label { width: 80px; font-size: 12px; }
    .cell { width: 50px; height: 40px; font-size: 18px; }
    .hand-cell { width: 50px; height: 24px; font-size: 13px; }
    .note { margin-left: 12px; font-size: 11px; max-width: 240px; }
  }
</style>
</head>
<body>

<a href="../index.html" class="back-link" aria-label="Back to CS 302 Home">← CS 302 Home</a>
<h1>Insertion Sort — Shift & Insert</h1>
<p class="subtitle">
  Save the next unsorted item. <span class="orange">Shift</span> sorted items right until the correct position is found. <span class="bold">Insert</span> into the gap.<br>
  Sorted region grows from <span class="bold">left to right</span>. Uses <span class="orange">shifts, not swaps</span>.
</p>

<div class="legend" role="list" aria-label="Color legend">
  <div class="legend-item" role="listitem"><div class="legend-swatch" style="background:#065F46" aria-hidden="true"></div> Sorted</div>
  <div class="legend-item" role="listitem"><div class="legend-swatch" style="background:#312E81" aria-hidden="true"></div> Unsorted</div>
  <div class="legend-item" role="listitem"><div class="legend-swatch" style="background:#6366F1" aria-hidden="true"></div> Held / Inserted</div>
  <div class="legend-item" role="listitem"><div class="legend-swatch" style="background:#9A3412" aria-hidden="true"></div> Shifted right</div>
  <div class="legend-item" role="listitem"><div class="legend-swatch" style="background:#0B0F1A;border:1.5px dashed #4338CA" aria-hidden="true"></div> Gap</div>
</div>

<div class="controls" role="toolbar" aria-label="Animation controls">
  <button class="btn" id="playBtn" onclick="togglePlay()" aria-label="Play animation">▶ Play</button>
  <button class="btn" onclick="resetAll()" aria-label="Reset animation">↺ Reset</button>
  <button class="btn" onclick="stepForward()" aria-label="Step forward">Step →</button>
  <label for="speedSlider">Speed:</label>
  <input type="range" id="speedSlider" min="1" max="5" value="3" aria-label="Animation speed">
  <span id="stepCounter" aria-live="polite">0 / 0</span>
</div>

<div id="diagram" role="region" aria-label="Sorting visualization"></div>

<script>
// Each step: { step, label, arr, sorted[], unsorted[], held:{val,showAt}, shifted[], gapAt, insertAt, note }
const steps = [
  // Initial
  { step: 0, label: "Initial", arr: [29,10,14,37,13], sorted: [0], unsorted: [1,2,3,4], held: null, shifted: [], gapAt: null, insertAt: null,
    note: "Sorted region: [29]. Unsorted: [10, 14, 37, 13]" },

  // --- INSERT 10 ---
  { step: 0, label: "---", action: "divider" },
  { step: 1, label: "Save 10", arr: [29,null,14,37,13], sorted: [0], unsorted: [2,3,4], held: {val:10, pos:1}, shifted: [], gapAt: 1, insertAt: null,
    note: '<span class="insert-text">Pick up 10</span> (index 1). Save it aside.' },
  { step: 1, label: "Shift 29→", arr: [null,29,14,37,13], sorted: [], unsorted: [2,3,4], held: {val:10, pos:0}, shifted: [1], gapAt: 0, insertAt: null,
    note: '<span class="shift-text">10 < 29 → shift 29 right.</span> Gap moves to index 0.' },
  { step: 1, label: "Insert 10", arr: [10,29,14,37,13], sorted: [0,1], unsorted: [2,3,4], held: null, shifted: [], gapAt: null, insertAt: 0,
    note: '<span class="insert-text">Insert 10 at index 0.</span> 1 comparison, 1 shift.' },

  // --- INSERT 14 ---
  { step: 0, label: "---", action: "divider" },
  { step: 2, label: "Save 14", arr: [10,29,null,37,13], sorted: [0,1], unsorted: [3,4], held: {val:14, pos:2}, shifted: [], gapAt: 2, insertAt: null,
    note: '<span class="insert-text">Pick up 14</span> (index 2). Save it aside.' },
  { step: 2, label: "Shift 29→", arr: [10,null,29,37,13], sorted: [0], unsorted: [3,4], held: {val:14, pos:1}, shifted: [2], gapAt: 1, insertAt: null,
    note: '<span class="shift-text">14 < 29 → shift 29 right.</span>' },
  { step: 2, label: "Stop", arr: [10,null,29,37,13], sorted: [0], unsorted: [3,4], held: {val:14, pos:1}, shifted: [2], gapAt: 1, insertAt: null,
    note: '<span class="ok-text">14 > 10 → stop shifting.</span>' },
  { step: 2, label: "Insert 14", arr: [10,14,29,37,13], sorted: [0,1,2], unsorted: [3,4], held: null, shifted: [], gapAt: null, insertAt: 1,
    note: '<span class="insert-text">Insert 14 at index 1.</span> 2 comparisons, 1 shift.' },

  // --- INSERT 37 ---
  { step: 0, label: "---", action: "divider" },
  { step: 3, label: "Save 37", arr: [10,14,29,null,13], sorted: [0,1,2], unsorted: [4], held: {val:37, pos:3}, shifted: [], gapAt: 3, insertAt: null,
    note: '<span class="insert-text">Pick up 37</span> (index 3). Save it aside.' },
  { step: 3, label: "No shifts!", arr: [10,14,29,37,13], sorted: [0,1,2,3], unsorted: [4], held: null, shifted: [], gapAt: null, insertAt: 3,
    note: '<span class="ok-text">37 > 29 → already in position!</span> 1 comparison, 0 shifts.' },

  // --- INSERT 13 ---
  { step: 0, label: "---", action: "divider" },
  { step: 4, label: "Save 13", arr: [10,14,29,37,null], sorted: [0,1,2,3], unsorted: [], held: {val:13, pos:4}, shifted: [], gapAt: 4, insertAt: null,
    note: '<span class="insert-text">Pick up 13</span> (index 4). Save it aside.' },
  { step: 4, label: "Shift 37→", arr: [10,14,29,null,37], sorted: [0,1,2], unsorted: [], held: {val:13, pos:3}, shifted: [4], gapAt: 3, insertAt: null,
    note: '<span class="shift-text">13 < 37 → shift 37 right.</span>' },
  { step: 4, label: "Shift 29→", arr: [10,14,null,29,37], sorted: [0,1], unsorted: [], held: {val:13, pos:2}, shifted: [3,4], gapAt: 2, insertAt: null,
    note: '<span class="shift-text">13 < 29 → shift 29 right.</span>' },
  { step: 4, label: "Shift 14→", arr: [10,null,14,29,37], sorted: [0], unsorted: [], held: {val:13, pos:1}, shifted: [2,3,4], gapAt: 1, insertAt: null,
    note: '<span class="shift-text">13 < 14 → shift 14 right.</span>' },
  { step: 4, label: "Stop", arr: [10,null,14,29,37], sorted: [0], unsorted: [], held: {val:13, pos:1}, shifted: [2,3,4], gapAt: 1, insertAt: null,
    note: '<span class="ok-text">13 > 10 → stop shifting.</span>' },
  { step: 4, label: "Insert 13", arr: [10,13,14,29,37], sorted: [0,1,2,3,4], unsorted: [], held: null, shifted: [], gapAt: null, insertAt: 1,
    note: '<span class="insert-text">Insert 13 at index 1.</span> 4 comparisons, 3 shifts.' },

  // FINAL
  { step: 0, label: "---", action: "divider" },
  { step: 0, label: "Final", arr: [10,13,14,29,37], sorted: [0,1,2,3,4], unsorted: [], held: null, shifted: [], gapAt: null, insertAt: null,
    note: '✓ Sorted! Total: 8 comparisons, 5 shifts.' },
];

let currentStep = -1;
let playing = false;
let timer = null;

function getSpeed() {
  const v = document.getElementById('speedSlider').value;
  return [1800, 1300, 900, 550, 300][v - 1];
}

function updateButtons() {
  const playBtn = document.getElementById('playBtn');
  playBtn.disabled = currentStep >= steps.length - 1 && !playing;
}

document.getElementById('stepCounter').textContent = '0 / ' + steps.length;

function renderStep(s, index) {
  if (s.action === "divider") {
    const hr = document.createElement('hr');
    hr.className = 'divider';
    hr.setAttribute('aria-hidden', 'true');
    return hr;
  }

  const row = document.createElement('div');
  row.className = 'step-row';

  // Label
  const label = document.createElement('div');
  label.className = 'step-label';
  if (s.step > 0) {
    label.innerHTML = '<span class="step-num">Insert #' + s.step + '</span><br>' + s.label;
  } else {
    label.textContent = s.label;
  }
  row.appendChild(label);

  // Array area (held item row + main array)
  const area = document.createElement('div');
  area.className = 'array-area';

  // Held item row
  const handRow = document.createElement('div');
  handRow.className = 'hand-row';
  handRow.setAttribute('role', 'list');
  handRow.setAttribute('aria-label', s.held ? `Held item: ${s.held.val} at position ${s.held.pos}` : 'No item held');
  
  if (s.held) {
    const hl = document.createElement('span');
    hl.className = 'hand-label';
    hl.textContent = 'held:';
    handRow.appendChild(hl);
    for (let i = 0; i < 5; i++) {
      const hc = document.createElement('div');
      hc.className = 'hand-cell';
      hc.setAttribute('role', 'listitem');
      if (i === s.held.pos) {
        hc.classList.add('held');
        hc.textContent = s.held.val;
        hc.setAttribute('aria-label', `Held value ${s.held.val}`);
      } else {
        hc.classList.add('empty');
        hc.setAttribute('aria-hidden', 'true');
      }
      handRow.appendChild(hc);
    }
  } else {
    handRow.style.height = '6px';
    handRow.setAttribute('aria-hidden', 'true');
  }
  area.appendChild(handRow);

  // Main array
  const cells = document.createElement('div');
  cells.className = 'cells';
  cells.setAttribute('role', 'list');
  cells.setAttribute('aria-label', `Array state: ${s.arr.map((v, i) => v === null ? 'gap' : v).join(', ')}`);

  s.arr.forEach((val, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.setAttribute('role', 'listitem');
    
    let ariaLabel = `Index ${i}`;
    if (val === null || i === s.gapAt) {
      cell.classList.add('gap');
      cell.textContent = '';
      ariaLabel += ', gap';
    } else if (i === s.insertAt) {
      cell.classList.add('inserted');
      cell.textContent = val;
      ariaLabel += `, value ${val}, inserted`;
    } else if (s.shifted.includes(i)) {
      cell.classList.add('shifted');
      cell.textContent = val;
      ariaLabel += `, value ${val}, shifted`;
    } else if (s.sorted.includes(i)) {
      cell.classList.add('sorted');
      cell.textContent = val;
      ariaLabel += `, value ${val}, sorted`;
    } else if (s.unsorted.includes(i)) {
      cell.classList.add('unsorted');
      cell.textContent = val;
      ariaLabel += `, value ${val}, unsorted`;
    } else {
      cell.classList.add('unsorted');
      cell.textContent = val;
      ariaLabel += `, value ${val}`;
    }
    
    cell.setAttribute('aria-label', ariaLabel);

    const idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = i;
    idx.setAttribute('aria-hidden', 'true');
    cell.appendChild(idx);
    cells.appendChild(cell);
  });

  area.appendChild(cells);
  row.appendChild(area);

  // Note
  const note = document.createElement('div');
  note.className = 'note';
  note.innerHTML = s.note;
  note.setAttribute('aria-live', 'polite');
  row.appendChild(note);

  row.setAttribute('aria-label', `Step ${index + 1}: ${s.label}`);
  return row;
}

function stepForward() {
  if (currentStep >= steps.length - 1) {
    updateButtons();
    return;
  }
  currentStep++;
  const diagram = document.getElementById('diagram');
  const el = renderStep(steps[currentStep], currentStep);
  diagram.appendChild(el);
  if (el.classList && el.classList.contains('step-row')) {
    requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('visible'); }); });
  }
  document.getElementById('stepCounter').textContent = (currentStep + 1) + ' / ' + steps.length;
  updateButtons();
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (playing) {
    playing = false; clearInterval(timer);
    btn.textContent = '▶ Play'; 
    btn.setAttribute('aria-label', 'Play animation');
    btn.classList.remove('active');
  } else {
    if (currentStep >= steps.length - 1) resetAll();
    playing = true;
    btn.textContent = '⏸ Pause'; 
    btn.setAttribute('aria-label', 'Pause animation');
    btn.classList.add('active');
    timer = setInterval(() => {
      if (currentStep >= steps.length - 1) { togglePlay(); return; }
      stepForward();
    }, getSpeed());
  }
  updateButtons();
}

function resetAll() {
  playing = false; clearInterval(timer);
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').setAttribute('aria-label', 'Play animation');
  document.getElementById('playBtn').classList.remove('active');
  currentStep = -1;
  document.getElementById('diagram').innerHTML = '';
  document.getElementById('stepCounter').textContent = '0 / ' + steps.length;
  updateButtons();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (playing) togglePlay();
    else stepForward();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (playing) togglePlay();
    resetAll();
  } else if (e.key === 'r' || e.key === 'R') {
    resetAll();
  }
});

stepForward();
</script>
</body>
</html>
